<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uschools-home</title>
    <style>
        body{
            background-color: grey;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding: 0px;
            margin: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        header {
            background-color: aqua;
            padding: 0px;
            margin: 0px;
            position: fixed;
            top: 0;
            width: 100%;
            height: 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: whitesmoke;
            
        }
        header h1 {
            margin-left: 10px;
        }
        .header-right{
            margin-right: 10%;
        }

        .logout_btn{
           background-color: rgb(224, 34, 34);
           margin-right: 50%;
           color: white;
           border-radius: 10px; 
           border: none; 
           width: 80px;  
           height: 30px;
           cursor: pointer;  
           transition: .3s all;   
        }
        .logout_btn:hover{
            background-color: red;
            transform: translateX(5px);
        }
        
        .home-box{
           position: relative;
           top: 100px;
           width: 700px;
           height: 400px;
           border-radius: 10px;
           box-shadow: 10px;
           padding: 10px;
           box-shadow: 2px 3px 4px 3px rgb(229, 243, 168);
           text-align: center;
           background-color: wheat;
        }
                
    </style>
</head>
<body>
    <header>
        <h1>Uschools</h1>
        <div class="header-right">
            <a href="{% url 'logout' %}"><button class="logout_btn">Log Out</button></a>
            
        </div>
    </header>
<div class="home-box">
    <h1>Welcome, {{ user.username }}! </h1>
    <p>You are now logged in.</p>
    
 
    </div>

</body>
</html>

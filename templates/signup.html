{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uschools-signup</title>
    <style>
        body{
            background-color: grey;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding: 0px;
            margin: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        header {
            background-color: aqua;
            padding: 0px;
            margin: 0px;
            position: fixed;
            top: 0;
            width: 100%;
            height: 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: whitesmoke;
        }
        header h1 {
            margin-left: 10px;
        }
        .header-right{
            margin-right: 10%;
        }

        .login_btn{
           background-color: rgb(17, 100, 17);
           margin-right: 50%;
           color: white;
           border-radius: 10px; 
           border: none; 
           width: 80px;  
           height: 30px; 
           cursor: pointer;  
           transition: .3s all; 
        }
        .login_btn:hover{
            background-color: green;
            transform: translateX(5px);
        }

        .signup-box{
           position: relative;
           top: 100px;
           width: 700px;
           height: 600px;
           border-radius: 10px;
           box-shadow: 10px;
           padding: 10px;
           box-shadow: 2px 3px 4px 3px rgb(229, 243, 168);
           text-align: center;
           background-color: wheat;
        }
        
        .signup-contents{
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .signup-contents label{
            padding: 20px;
            
        }
        .signup-contents input{
            padding: 10px; 
            border-radius: 10px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 40%;
        }
        .btn{
            padding: 20px;
            width: 500px;
            
        }
        .btn #submit-btn {
            width: 80%;
            height: 40px;
            color: white;
            border: none;
            background-color: rgb(43, 43, 181);
            border-radius: 10px;
            transition: .3s all;
        }
        .btn #submit-btn:hover{
            background-color: blue;
            transform: translateY(5px);
        }

        .signup-box button:hover {
            background-color: lightblue;
            cursor: pointer;
        }
        .message-body{
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .message{
            color: red;
            background-color: rgb(225, 245, 245);
            width: 300px;
            height: 30px;
            
        }
        

    
    </style>
</head>
<body>
    <header>
        <h1>Uschools</h1>
        <div class="header-right">
        <a href="{% url 'login' %}"><button class="login_btn">Log In</button></a>
        </div>
    </header>
<div class="signup-box">
    <form method="POST">
    {% csrf_token %}
    
    <h2>Sign Up</h2>
    <div class="signup-contents">
        <label for="username">Name:</label>
        <input type="text" name="username" placeholder="username" required>
        <label for="email">Email:</label>
        <input type="email" name="email" placeholder="email" required>
        <label for="password">Password:</label>
        <input type="password" name="password" placeholder="password" required>
        <div class="btn">
            <button id="submit-btn" type="submit">Sign Up</button>
        </div>
    </div>

    <div class="message-body">
    {% if messages %}
    {% for message in messages %}
    <div class="message">
    {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    </div>
    </div>
    </form>
</div>
{% endblock content %}


</body>
</html>

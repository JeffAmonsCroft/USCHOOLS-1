<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>uschools-password-reset-form</title>
  <style>
    body{
        background-color: grey;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        padding: 0px;
        margin: 0px;
        display: flex;
        align-items: center;
       justify-content: center;
        }
        header {
            background-color: aqua;
            padding: 0px;
            margin: 0px;
            position: fixed;
            top: 0;
            width: 100%;
            height: 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: whitesmoke;
        }
        header h1 {
            margin-left: 10px;
        }
        .header-right{
            margin-right: 10%;
            width: 30px;
            height: 20px;
        }
        .signup_btn{
           background-color: rgb(34, 34, 224);
           margin-right: 50%;
           color: white;
           border-radius: 10px; 
           border: none; 
           width: 80px;  
           height: 30px;
           cursor: pointer;  
           transition: .3s all;  
        }
        .signup_btn:hover{
          background-color: blue;
          transform: translateX(5px);
        }
        .forgot_password{
           position: absolute;
           top: 20%;
           height: 50%;
           width: 50%;
           border-radius: 10px;
           box-shadow: 10px;
           padding: 100px;
           box-shadow: 2px 3px 4px 3px rgb(229, 243, 168);
           text-align: center;
           background-color: wheat;
        }
        
        .reset_info{
            padding: 10px;
            display: flex;
            flex-direction: column;
            /* align-items: center;
            justify-content: center; */
        }
        .input{
            padding: 10px;
        }
        .reset_info input{
          padding: 10px;
          width: 50%;
          border: none;
          border-radius: 10px;
          text-align: center;
        }
        .sbt-btn{
          padding: 10px;
        }
        .sbt-btn button{
          padding: 10px;
          width: 70%;
          border: none;
          border-radius: 10px;
          color: white;
          background-color: rgb(17, 99, 17);
          cursor: pointer;
          transition: .3s all;
        }
        .sbt-btn button:hover{
          background-color: green;
          transform: translateY(10px);
        }
        .message-body{
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
        .message{
            color: red;
            background-color: rgb(225, 245, 245);
            width: 300px;
            height: 30px;
            
        }
        
    </style>
</head>
<body>
  <header>
        <h1>Uschools</h1>
        <div class="header-right">
          <a href="{% url 'signup' %}"><button class="signup_btn">Sign Up</button></a>
        </div>
    </header>

    <div class="forgot_password">
      <form action="" method="POST">
        {% csrf_token %}
        <div class="reset_info">
          <h1>Forgot your password?</h1>
          <p>Enter the email associated with your account below to receive instructions</p>
          <div class="input">
            <input type="email" name="email" placeholder="youremail@gmail.com" required>
          </div>
          <div class="sbt-btn">
            <button type="submit">Submit</button>
          </div>
        </div>

        <div class="message-body">
        {% if messages %}
        {% for message in messages %}
        <div class="message">
        {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        </div>
        
      </form>
    </div>
</body>
</html>

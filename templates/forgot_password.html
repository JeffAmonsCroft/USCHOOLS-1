<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body{
            background-color: grey;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding: 0px;
            margin: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        header {
            background-color: aqua;
            padding: 0px;
            margin: 0px;
            position: fixed;
            top: 0;
            width: 100%;
            height: 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: whitesmoke;
        }
        header h1 {
            margin-left: 10px;
        }
        .header-right{
            margin-right: 10%;
        }
        .forgot_password-box{
           position: relative;
           top: 100px;
           width: 600px;
           height: 400px;
           border-radius: 10px;
           box-shadow: 10px;
           padding: 100px;
           box-shadow: 2px 3px 4px 3px rgb(229, 243, 168);
           text-align: center;
           background-color: wheat;
        }
        
        .forgot_password-contents{
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .forgot_password-contents label{
            padding: 20px;
            
        }
        .forgot_password-contents input{
            padding: 10px; 
            border-radius: 10px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            
        }
        .btn{
            padding: 20px;
            width: 500px;
            
        }
        .btn #submit-btn {
            width: 80%;
            height: 40px;
            color: white;
            border: none;
            background-color: green;
            border-radius: 10px;
            transition: .2s all;
        }

        .forgot_password-box button:hover {
            background-color: lightblue;
            cursor: pointer;
        }
        .message-body{
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
        .message{
            color: red;
            background-color: rgb(225, 245, 245);
            width: 300px;
            height: 30px;
            
        }

    </style>
</head>
<body>

    <header>
        <h1>Uschools</h1>
        <div class="header-right">
        
        </div>
    </header>

<div class="forgot_password-box">
<h1>Reset Password</h1>
<form method="post">
    {% csrf_token %}

<p>Enter your email below to receive instructions</p>
<div class="forgot_password-contents">
<input type="email" name="email" placeholder="youremail" required>
    <div class="btn">
        <button id="submit-btn" type="submit">Send me instructions</button>
    </div>
</div>
<div class="message-body">
        {% if messages %}
        {% for message in messages %}
        <div class="message">
        {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        </div>
</form>
</div>
</body>
</html>

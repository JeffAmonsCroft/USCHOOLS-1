<!--	templates/base.html	-->
{% load static %}
<!DOCTYPE html>

<head>
    <meta charset="utf-8">
    <title>{% block title %}{% endblock title %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>

<body>
    <header>
        <h1>Uschools</h1>
        <div id="signup_login_btns">
            <a href="{% url 'signup' %}"><button id="btn_1" type="submit">Sign Up</button></a>
            <a href="{% url 'login' %}"><button id="btn_2" type="submit">Log In</button></a>
        </div>
    </header>
    <main>
        {% block content %}
        {% endblock content %}
    </main>

</body>

</html>
